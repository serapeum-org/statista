# This workflows will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: pypi-release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build and publish to PyPI
        uses: Serapieum-of-alex/github-actions/actions/release/pypi@pypi-release/v1
        with:
          package: ${{ env.PACKAGE }}
          pypi-username: __token__
          pypi-password: ${{ secrets.PYPI_PUBLISH }}
          python-version: '3.12'
          package-manager: 'uv'
          install-groups: "groups: dev"
          verify-lock: 'false'
          # pypi-repository-url: 'https://test.pypi.org/legacy/'
