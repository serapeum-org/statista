# Build and publish the Python package to PyPI using the Serapieum composite action.

name: pypi-release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag, branch, or SHA to publish to PyPI (e.g. v0.8.0)"
        required: true
        type: string
  workflow_run:
    workflows: ['github-release']
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # For workflow_dispatch: check out the user-supplied ref (tag/branch/SHA).
      # For workflow_run: check out the HEAD of the branch where github-release ran,
      # so we pick up the version-bump commit + lockfile sync commit that
      # github-release pushed AFTER its triggering SHA. Using the default checkout
      # (or head_sha) would publish the pre-bump source to PyPI.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_branch }}

      - name: Build and publish to PyPI
        uses: serapeum-org/github-actions/actions/release/pypi@pypi-release/v1
        with:
          pypi-username: __token__
          pypi-password: ${{ secrets.PYPI_PUBLISH }}
          python-version: '3.12'
          package-manager: 'uv'
          install-groups: "groups: dev"
          verify-lock: 'false'
          # pypi-repository-url: 'https://test.pypi.org/legacy/'
