site_name: Statista
site_description: Statistical analysis package
site_url: https://serapeum-org.github.io/statista/
repo_url: https://github.com/serapeum-org/statista
repo_name: serapeum-org/statista

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips
    - search.highlight
    - search.suggest
    - toc.follow
    - announce.dismiss
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-night
      name: Switch to system preference
  primary: indigo
  accent: indigo
  icon:
    repo: fontawesome/brands/github


plugins:
  - search
  - mkdocs-jupyter:
      execute: false  # notebooks are pre-executed and committed with outputs
      allow_errors: false
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
  - table-reader
  - tags
  - mike:
      # These fields are all optional; the defaults are as below...
      alias_type: symlink
      redirect_template: null
      deploy_prefix: ''
      canonical_version: null
      version_selector: true
      css_dir: css
      javascript_dir: js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: "#"
      toc_depth: 1-4
      anchorlink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Reference:
    - Distributions:
      - Facade: reference/distributions/facade.md
      - Plotting Position: reference/distributions/plotting-position.md
      - Gumbel: reference/distributions/gumbel.md
      - GEV: reference/distributions/gev.md
      - Exponential: reference/distributions/exponential.md
      - Normal: reference/distributions/normal.md
      - All Distributions: reference/distributions-class.md
    - Parameters:
      - L-moments: reference/parameters/lmoments.md
      - Extreme Value: reference/parameters/extreme-value.md
      - Normal Family: reference/parameters/normal-family.md
      - Other: reference/parameters/other.md
    - Time Series:
      - Overview: reference/time-series/index.md
      - Descriptive: reference/time-series/descriptive.md
      - Visualization: reference/time-series/visualization.md
      - Missing Data: reference/time-series/missing.md
      - Correlation: reference/time-series/correlation.md
      - Stationarity: reference/time-series/stationarity.md
      - Trend: reference/time-series/trend.md
      - Distribution: reference/time-series/distribution.md
      - Change Point: reference/time-series/changepoint.md
      - Decomposition: reference/time-series/decomposition.md
      - Seasonal: reference/time-series/seasonal.md
      - Hydrological: reference/time-series/hydrological.md
      - Comparison: reference/time-series/comparison.md
    - Extreme Value Analysis: reference/eva-class.md
    - Confidence Interval: reference/confidence-interval.md
    - Descriptors: reference/descriptors-module.md
    - Plot: reference/plot-class.md
    - Sensitivity Analysis: reference/sensitivity-class.md
    - Tools: reference/tools-module.md
    - Utils: reference/utils-module.md
  - Examples:
    - sensitivity-analysis:
      - Sensitivity Analysis: notebook/sensitivity-analysis/scs-cn.ipynb
    - Extreme Value Analysis:
      - Extreme Value Analysis: notebook/extreme-value-analysis/extreme-value-analysis.ipynb
      - Rhine Catchment: notebook/extreme-value-analysis/rhine_discharge_analysis.ipynb
    - Time Series:
      - Descriptive Statistics: notebook/time_series/01_descriptive_statistics.ipynb
      - Visualization: notebook/time_series/02_visualization.ipynb
      - Missing Data: notebook/time_series/03_missing_data.ipynb
      - Correlation & Autocorrelation: notebook/time_series/04_correlation_autocorrelation.ipynb
      - Stationarity: notebook/time_series/05_stationarity.ipynb
      - Trend Detection: notebook/time_series/06_trend_detection.ipynb
      - Distribution Fitting: notebook/time_series/07_distribution_fitting.ipynb
      - Change Point Detection: notebook/time_series/08_change_point_detection.ipynb
      - Decomposition & Smoothing: notebook/time_series/09_decomposition_smoothing.ipynb
      - Seasonal Analysis: notebook/time_series/10_seasonal_analysis.ipynb
      - Hydrological Analysis: notebook/time_series/11_hydrological_analysis.ipynb
      - Comparison & Anomaly: notebook/time_series/12_comparison_anomaly.ipynb
  - Guides:
    - Commitizen: guides/commitizen.md
    - Mypy: guides/mypy.md
  - About:
    - Change-log: change-log.md
    - Code of Conduct: CODE_OF_CONDUCT.md
    - Contributing: contributing.md
    - License: LICENSE.md
    - Authors: AUTHORS.md

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/serapeum-org/statista
  version:
      provider: mike
  version_selector: true
